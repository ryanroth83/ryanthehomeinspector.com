{{ define "main" }}
  {{ partial "page-header" . }}
  <section class="section">
    <div class="container">
      <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
        {{ range .RegularPages.ByWeight }}
          <div class="md:col-span-1">
            <a href="{{ .Permalink }}" class="group block h-full p-8 bg-white dark:bg-neutral-900 border border-neutral-200 dark:border-neutral-800 rounded-2xl shadow-sm hover:shadow-md transition-all duration-300">
              <div class="flex items-center justify-between mb-4">
                <div class="p-3 bg-theme-light dark:bg-darkmode-theme-light rounded-xl text-primary group-hover:bg-primary group-hover:text-white transition-colors duration-300">
                  <i class="fa fa-book-open text-2xl"></i>
                </div>
                <i class="fa fa-chevron-right text-neutral-300 group-hover:text-primary transition-colors"></i>
              </div>
              <h3 class="text-xl font-bold text-neutral-900 dark:text-white mb-2">{{ .Title }}</h3>
              {{ if .Description }}
                <p class="text-sm text-neutral-500 dark:text-neutral-400 leading-relaxed italic">{{ .Description }}</p>
              {{ end }}
            </a>
          </div>
        {{ end }}
      </div>
    </div>
  </section>
{{ end }}
