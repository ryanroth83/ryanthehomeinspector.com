{{- $src := .Get "src" | default (.Get 0) -}}
{{- $id := .Get "id" | default "scheduler-frame" -}}

<div class="iframe-container" style="width: 100%; overflow: hidden;">
  <iframe
    id="{{ $id }}"
    src="{{ $src | safeURL }}"
    style="width: 1px; min-width: 100%; border: none;"
    scrolling="no">
  </iframe>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/iframe-resizer/4.3.2/iframeResizer.min.id.js"></script>
<script>
  iFrameResize({
    log: false,
    checkOrigin: false,
    // 'max' or 'grow' are often more reliable for multi-step schedulers
    heightCalculationMethod: 'max', 
    interval: 32, // Forces the frame to check for height changes every 32ms
    onInit: function(iframe) {
        // Forces a redraw on load
        iframe.iFrameResizer.resize();
    }
  }, '#{{ $id }}');
</script>
