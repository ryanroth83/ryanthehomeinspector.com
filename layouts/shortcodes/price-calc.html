<div style="border: 1px solid #ccc; padding: 20px; border-radius: 5px; max-width: 400px; margin: 20px 0;">
    <h3 style="margin-top: 0;"><strong>Price Estimator</strong></h3>
    <p>Enter the total square footage of the property to see the estimated inspection fee.</p>
    
    <label for="sqft">Square Footage:</label>
    <input type="number" id="sqft" placeholder="e.g. 2500" style="width: 100%; padding: 8px; margin: 10px 0; border: 1px solid #ddd;">
    
    <button onclick="calculatePrice()" style="padding: 10px 15px; cursor: pointer; background-color: #333; color: #fff; border: none; border-radius: 3px;">Calculate Estimate</button>
    
    <p id="result" style="margin-top: 20px; font-weight: bold; font-size: 1.2em; min-height: 1.5em;"></p>
</div>

<script>
function calculatePrice() {
    const sqft = document.getElementById('sqft').value;
    const baseFee = 340;
    const rate = 0.07;
    
    if (sqft > 0) {
        const total = baseFee + (sqft * rate);
        document.getElementById('result').innerText = "Estimated Fee: $" + total.toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 2});
    } else {
        document.getElementById('result').innerText = "Please enter a valid square footage.";
    }
}
</script>
