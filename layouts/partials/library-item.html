{{ $isDirect := .Params.direct_link }}
{{ $dest := .Permalink }}
{{ if $isDirect }}{{ $dest = .Params.direct_link }}{{ end }}
{{ $tab := "" }}{{ if .Params.new_tab }}{{ $tab = "_blank" }}{{ end }}

<a href="{{ $dest | safeURL }}" 
   {{ with $tab }} target="{{ . }}" rel="noopener" {{ end }}
   class="group flex items-center justify-between p-5 bg-neutral-950/50 border border-neutral-800 rounded-2xl transition-all hover:bg-neutral-800 h-[100px]">
  
  <div class="flex flex-col justify-center min-w-0">
    <h3 class="text-lg font-bold text-white group-hover:text-blue-500 transition-colors leading-tight truncate">
      {{ .Title }}
    </h3>
    {{ with .Params.description }}
      <p class="text-xs text-neutral-500 italic mt-1 truncate">
        {{ . }}
      </p>
    {{ end }}
  </div>

  {{ if $isDirect }}
  <div class="text-neutral-700 group-hover:text-blue-500 flex-shrink-0 ml-4">
    <i class="fa fa-chevron-right text-xs"></i>
  </div>
  {{ end }}
</a>
