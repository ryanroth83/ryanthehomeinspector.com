{{ $id := .context.label | urlize }}
<div class="price-slider-container bg-neutral-50 dark:bg-neutral-800/50 p-6 rounded-lg border border-neutral-200 dark:border-neutral-700">
  <div class="space-y-4">
    <div class="flex justify-between items-center">
      <label class="text-sm font-bold text-neutral-600 dark:text-neutral-400">Estimate for {{ .context.label }}:</label>
      <span id="display-{{ $id }}" class="font-mono font-bold text-primary">2,500 sq.ft.</span>
    </div>
    
    <input type="range" id="slider-{{ $id }}" min="500" max="6000" step="50" value="2500" 
      class="w-full h-2 bg-neutral-200 rounded-lg appearance-none cursor-pointer accent-primary">
    
    <div class="text-right">
      <span class="text-xs uppercase text-neutral-400 block">Estimated Cost</span>
      <span id="total-{{ $id }}" class="text-2xl font-black text-neutral-900 dark:text-white">$0.00</span>
    </div>
  </div>
</div>

<script>
  (function() {
    const slider = document.getElementById('slider-{{ $id }}');
    const display = document.getElementById('display-{{ $id }}');
    const total = document.getElementById('total-{{ $id }}');

    const base = {{ .base }};
    const rate = {{ .rate }};

    function update() {
      const val = parseInt(slider.value);
      display.textContent = val.toLocaleString() + " sq.ft.";
      const cost = base + (val * rate);
      total.textContent = "$" + cost.toLocaleString(undefined, {minimumFractionDigits: 2});
    }

    slider.addEventListener('input', update);
    update();
  })();
</script>
