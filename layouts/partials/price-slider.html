{{ $id := .context.label | urlize }}
<div class="w-full">
  
  <div class="flex justify-between items-center mb-6 w-full">
    
    <div class="flex flex-col gap-1">
      <span class="text-lg font-bold" {{ printf "style='color: %s;'" .color | safeHTMLAttr }}>
        {{ printf "$%v + $%v/sq.ft." .base .rate }}
      </span>
      <span id="display-{{ $id }}" class="text-base font-medium text-neutral-500">
        2,500 sq.ft.
      </span>
    </div>

    <div class="text-right flex justify-end">
      <span id="total-{{ $id }}" class="text-4xl md:text-5xl font-black leading-none tracking-tight inline-block" {{ printf "style='color: %s;'" .color | safeHTMLAttr }}>
        $0.00
      </span>
    </div>
    
  </div>
  
  <div class="w-full flex">
    <input type="range" id="slider-{{ $id }}" min="500" max="6000" step="50" value="2500" 
      class="w-full h-2 bg-neutral-200 dark:bg-neutral-800 rounded-lg appearance-none cursor-pointer block"
      {{ printf "style='accent-color: %s;'" .color | safeHTMLAttr }}>
  </div>
</div>

<script>
  (function() {
    const slider = document.getElementById('slider-{{ $id }}');
    const display = document.getElementById('display-{{ $id }}');
    const total = document.getElementById('total-{{ $id }}');

    const base = {{ .base }};
    const rate = {{ .rate }};

    function update() {
      const val = parseInt(slider.value);
      display.textContent = val.toLocaleString() + " sq.ft.";
      const cost = base + (val * rate);
      total.textContent = "$" + cost.toLocaleString(undefined, {minimumFractionDigits: 2});
    }

    slider.addEventListener('input', update);
    update();
  })();
</script>
