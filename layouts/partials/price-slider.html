{{ $id := .context.label | urlize }}
<div class="w-full">
  
  <div class="mb-6 text-center">
    <p class="text-xl md:text-3xl font-bold" {{ printf "style='color: %s;'" .color | safeHTMLAttr }}>
      {{ printf "$%v + $%v/sq.ft." .base .rate }}
    </p>
  </div>

  <div class="flex flex-col md:flex-row items-center md:items-baseline justify-center md:justify-between mb-8 w-full gap-1 md:gap-4">
    
    <div class="flex-shrink-0">
      <span id="display-{{ $id }}" class="text-2xl md:text-3xl font-semibold text-neutral-500 dark:text-neutral-400">
        1,700 sq.ft.
      </span>
    </div>

    <div class="text-center md:text-right flex-shrink-0">
      <span id="total-{{ $id }}" class="text-3xl md:text-5xl font-bold leading-none" {{ printf "style='color: %s;'" .color | safeHTMLAttr }}>
        $0
      </span>
    </div>
  </div>
  
  <div class="w-full px-2">
    <input type="range" id="slider-{{ $id }}" min="500" max="6000" step="100" value="1700" 
      class="w-full h-3 bg-neutral-200 dark:bg-neutral-800 rounded-lg appearance-none cursor-pointer block"
      {{ printf "style='accent-color: %s;'" .color | safeHTMLAttr }}>
  </div>
</div>

<script>
  (function() {
    const slider = document.getElementById('slider-{{ $id }}');
    const display = document.getElementById('display-{{ $id }}');
    const total = document.getElementById('total-{{ $id }}');

    const base = parseFloat("{{ .base }}") || 0;
    const rate = parseFloat("{{ .rate }}") || 0;

    function update() {
      const val = parseInt(slider.value);
      display.textContent = val.toLocaleString() + " sq.ft.";
      
      const cost = base + (val * rate);
      
      total.textContent = "$" + cost.toLocaleString(undefined, {
        minimumFractionDigits: 0, 
        maximumFractionDigits: 0
      });
    }

    slider.addEventListener('input', update);
    update();
  })();
</script>
