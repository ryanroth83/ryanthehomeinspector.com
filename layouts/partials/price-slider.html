{{ $id := .context.label | urlize }}
<div class="w-full">
  
  <div class="mb-4 text-center">
    <p class="text-2xl md:text-3xl" {{ printf "style='color: %s;'" .color | safeHTMLAttr }}>
      {{ printf "$%v + $%v/sq.ft." .base .rate }}
    </p>
  </div>

  <div class="flex flex-row items-baseline justify-between mb-6 w-full gap-2">
    
    <div class="flex-shrink-0">
      <span id="display-{{ $id }}" class="price-display-brand text-neutral-500">
        1,700 sq.ft.
      </span>
    </div>

    <div class="text-right flex-shrink-0">
      <span id="total-{{ $id }}" class="price-display-brand" {{ printf "style='color: %s;'" .color | safeHTMLAttr }}>
        $0
      </span>
    </div>
  </div>
  
  <div class="w-full flex">
    <input type="range" id="slider-{{ $id }}" min="500" max="6000" step="100" value="1700" 
      class="w-full h-2 bg-neutral-200 dark:bg-neutral-800 rounded-lg appearance-none cursor-pointer block"
      {{ printf "style='accent-color: %s;'" .color | safeHTMLAttr }}>
  </div>
</div>

<script>
  (function() {
    const slider = document.getElementById('slider-{{ $id }}');
    const display = document.getElementById('display-{{ $id }}');
    const total = document.getElementById('total-{{ $id }}');

    const base = parseFloat("{{ .base }}") || 0;
    const rate = parseFloat("{{ .rate }}") || 0;

    function update() {
      const val = parseInt(slider.value);
      display.textContent = val.toLocaleString() + " sq.ft.";
      
      // Calculation results in whole numbers due to 100-step slider
      const cost = base + (val * rate);
      
      // Output as whole dollar
      total.textContent = "$" + cost.toLocaleString(undefined, {
        minimumFractionDigits: 0, 
        maximumFractionDigits: 0
      });
    }

    slider.addEventListener('input', update);
    update();
  })();
</script>
