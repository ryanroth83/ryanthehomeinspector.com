{{ $searchPlaceholder := .Params.search_placeholder | default (printf "Search %s..." .Title) }}

<div class="relative max-w-md mx-auto mb-4 group">
  <input type="text" id="brandSearch" 
         placeholder="{{ $searchPlaceholder }}" 
         class="w-full px-5 py-3 pr-12 rounded-2xl border border-neutral-200 dark:border-neutral-700 bg-white dark:bg-neutral-900 focus:ring-2 focus:outline-none transition-all">
  
  <button id="clearSearch" 
          class="hidden absolute right-12 top-3.5 text-neutral-400 hover:text-neutral-600 dark:hover:text-neutral-200 transition-colors">
    <i class="fas fa-times-circle"></i>
  </button>

  <div class="absolute right-4 top-3.5 text-neutral-400">
    <i class="fas fa-search"></i>
  </div>
</div>

<script>
  document.addEventListener('DOMContentLoaded', function() {
    const searchInput = document.getElementById('brandSearch');
    const clearBtn = document.getElementById('clearSearch');
    if (!searchInput || !clearBtn) return;

    function performSearch(term) {
      const searchTerm = term.toLowerCase();
      const items = document.querySelectorAll('.brand-item');
      const letterGroups = document.querySelectorAll('.letter-group');

      // Toggle Clear Button visibility
      clearBtn.classList.toggle('hidden', searchTerm === "");

      items.forEach(item => {
        const text = item.textContent.toLowerCase();
        if (text.includes(searchTerm)) {
          item.style.setProperty('display', 'flex', 'important');
        } else {
          item.style.setProperty('display', 'none', 'important');
        }
      });

      letterGroups.forEach(group => {
        const visibleBrands = Array.from(group.querySelectorAll('.brand-item'))
                                   .filter(b => b.style.display !== 'none');
        if (visibleBrands.length > 0 || searchTerm === "") {
          group.style.setProperty('display', 'inline-block', 'important');
        } else {
          group.style.setProperty('display', 'none', 'important');
        }
      });
    }

    searchInput.addEventListener('input', (e) => performSearch(e.target.value));

    clearBtn.addEventListener('click', () => {
      searchInput.value = "";
      performSearch("");
      searchInput.focus();
    });
  });
</script>
